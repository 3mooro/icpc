<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الحضور</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <h2>نظام تسجيل الحضور 📷</h2>
    <div id="reader"></div>
    <p id="result"></p>

    <script>
        // *** حط اللينك بتاع Apps Script اللي نسخته هنا ***
        const APPS_SCRIPT_URL = "YOUR_WEB_APP_URL_HERE"; 

        let isScanning = true;

        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return; // عشان ميقعدش يبعت طلبات ورا بعض
            isScanning = false;
            
            document.getElementById('result').innerText = "جاري تسجيل: " + decodedText + "...";

            // إرسال البيانات لجوجل شيت
            fetch(APPS_SCRIPT_URL + "?id=" + encodeURIComponent(decodedText), { mode: 'no-cors' })
                .then(() => {
                    document.getElementById('result').innerText = "✅ تم تسجيل حضور: " + decodedText;
                    // يرجع يشتغل تاني بعد 3 ثواني عشان يسكان الشخص اللي بعده
                    setTimeout(() => { 
                        isScanning = true; 
                        document.getElementById('result').innerText = "";
                    }, 3000);
                }).catch(err => {
                    document.getElementById('result').innerText = "❌ حصلت مشكلة في التسجيل";
                    isScanning = true;
                });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess);
    </script>

</body>
</html>

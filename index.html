<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICPC Mansoura Attendance</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات العامة */
        body {
            font-family: 'Roboto', 'Cairo', sans-serif;
            background-color: #0a193d;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        #logo {
            max-width: 500px;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .container {
            background-color: #ffffff;
            color: #333;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }

        /* --- تنسيقات تسجيل الدخول الجديدة --- */
        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            text-align: right;
        }
        #login-error {
            color: #dc3545;
            font-weight: bold;
            display: none;
            margin-top: 10px;
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        #btn-logout {
            background-color: #6c757d;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
        }
        #btn-logout:hover { background-color: #5a6268; }

        /* منطقة الكاميرا وعرض البيانات */
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #reader img[alt="Info icon"] { display: none; }
        #reader__status_span { display: none !important; }

        #data-container {
            display: none;
            margin-top: 20px;
        }
        .data-row {
            font-size: 18px;
            margin-bottom: 15px;
            text-align: right;
        }
        .data-row span {
            font-weight: 700;
            color: #0056b3;
            display: block;
            margin-top: 5px;
        }

        /* الأزرار */
        .btn {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s ease;
            font-family: 'Cairo', sans-serif;
        }
        #btn-start { background-color: #0056b3; color: white; }
        #btn-start:hover { background-color: #004494; }
        #btn-register { background-color: #28a745; color: white; }
        #btn-register:hover { background-color: #218838; }
        #btn-cancel { background-color: #dc3545; color: white; }
        #btn-cancel:hover { background-color: #c82333; }
        button:disabled { background-color: #6c757d !important; cursor: not-allowed; opacity: 0.8; }

        #result-msg {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 700;
            min-height: 27px;
        }
    </style>
</head>
<body>

    <img id="logo" src="logo.png" alt="ICPC Mansoura Logo">
    <h1>ICPC Mansoura Attendance</h1>

    <div id="login-container" class="container">
        <h2 style="margin-top: 0;">تسجيل دخول المنظمين</h2>
        <input type="text" id="username" class="input-field" placeholder="اسم المستخدم">
        <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
        <button class="btn" id="btn-login" onclick="checkLogin()">تسجيل الدخول</button>
        <p id="login-error">اسم المستخدم أو كلمة المرور غير صحيحة!</p>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <div class="header-controls">
            <h3 style="margin: 0; color: #0056b3;">لوحة المسح</h3>
            <button id="btn-logout" onclick="logout()">تسجيل خروج</button>
        </div>
        
        <button id="btn-start" class="btn" onclick="startCamera()">فتح الكاميرا للمسح</button>
        <div id="reader"></div>

        <div id="data-container">
            <div class="data-row">الاسم: <span id="display-name"></span></div>
            <div class="data-row">الرقم القومي: <span id="display-nid"></span></div>
            <div class="data-row">الإيميل: <span id="display-email"></span></div>
            
            <button id="btn-register" class="btn" onclick="registerAttendance()">تسجيل حضور</button>
            <button id="btn-cancel" class="btn" onclick="startCamera()">إلغاء وإعادة المسح</button>
            <p id="result-msg"></p>
        </div>
    </div>

    <script>
        // ------------------ إعدادات الدخول ------------------
        const VALID_USERNAME = "admin";    // 👈 غير اسم المستخدم من هنا
        const VALID_PASSWORD = "icpc";     // 👈 غير كلمة المرور من هنا
        // ----------------------------------------------------

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7UFfhyGZDyaBfEKmRnB6kSaSinIiaAQ9alw0Wzl-b5tnXpn7UhoWwMhGCYla1DGJWHQ/exec"; 
        const SECRET_KEY = "omarloveicpc"; 

        let html5QrCode;
        let currentDecodedText = "";

        // التحقق عند تحميل الصفحة إذا كان مسجلاً للدخول مسبقاً
        window.onload = function() {
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                showApp();
            }
        };

        // دالة تسجيل الدخول
        function checkLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();

            if (user === VALID_USERNAME && pass === VALID_PASSWORD) {
                sessionStorage.setItem("isLoggedIn", "true");
                document.getElementById("login-error").style.display = "none";
                showApp();
            } else {
                document.getElementById("login-error").style.display = "block";
            }
        }

        // دالة إظهار التطبيق
        function showApp() {
            document.getElementById("login-container").style.display = "none";
            document.getElementById("app-container").style.display = "block";
        }

        // دالة تسجيل الخروج
        function logout() {
            sessionStorage.removeItem("isLoggedIn");
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            
            // إيقاف الكاميرا إذا كانت تعمل
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(err => console.log(err));
            }
            
            document.getElementById("app-container").style.display = "none";
            document.getElementById("login-container").style.display = "block";
            document.getElementById("reader").style.display = "none";
            document.getElementById("data-container").style.display = "none";
            document.getElementById("btn-start").style.display = "block";
        }

        // --- باقي دوال النظام كما هي ---

        function decryptData(encodedText, key) {
            try {
                let binaryString = atob(encodedText);
                let keyBytes = new TextEncoder().encode(key);
                let decryptedBytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    decryptedBytes[i] = binaryString.charCodeAt(i) ^ keyBytes[i % keyBytes.length];
                }
                return new TextDecoder().decode(decryptedBytes);
            } catch (e) { return null; }
        }

        function startCamera() {
            document.getElementById('data-container').style.display = 'none';
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            document.getElementById('result-msg').innerText = "";
            document.getElementById('btn-register').disabled = false;

            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(startScannerProcess).catch(err => console.log(err));
            } else {
                startScannerProcess();
            }
        }

        function startScannerProcess() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: {width: 250, height: 250} },
                (scannedEncryptedText) => {
                      playBeep();
                     html5QrCode.stop().then(() => {
                        document.getElementById('reader').style.display = 'none';
                        let decryptedText = decryptData(scannedEncryptedText, SECRET_KEY);
                        if (decryptedText && decryptedText.includes('|')) {
                            showData(decryptedText);
                        } else {
                            alert("❌ هذا الـ QR Code غير صالح أو غير مشفر بنظامنا!");
                            startCamera();
                        }
                    }).catch(err => console.log("خطأ في قفل الكاميرا", err));
                },
                (errorMessage) => {}
            ).catch(err => {
                alert("⚠️ تعذر فتح الكاميرا. يرجى التأكد من منح الصلاحيات أو استخدام متصفح حديث.");
                document.getElementById('btn-start').style.display = 'block';
                document.getElementById('reader').style.display = 'none';
            });
        }

        function showData(text) {
            currentDecodedText = text; 
            let parts = text.split('|');
            document.getElementById('display-name').innerText = parts[0] ? parts[0].trim() : '-';
            document.getElementById('display-nid').innerText = parts[1] ? parts[1].trim() : '-';
            document.getElementById('display-email').innerText = parts[2] ? parts[2].trim() : '-';
            document.getElementById('data-container').style.display = 'block';
        }

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
        
                oscillator.type = 'sine';
                oscillator.frequency.value = 800;
        
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); 
        
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
        
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.log("متصفحك لا يدعم توليد الصوت");
            }
        }

        function registerAttendance() {
            document.getElementById('result-msg').innerText = "جاري التسجيل...";
            document.getElementById('result-msg').style.color = "orange";
            document.getElementById('btn-register').disabled = true;

            fetch(APPS_SCRIPT_URL + "?id=" + encodeURIComponent(currentDecodedText), { mode: 'no-cors' })
                .then(() => {
                    document.getElementById('result-msg').innerText = "✅ تم التسجيل بنجاح!";
                    document.getElementById('result-msg').style.color = "green";
                    setTimeout(() => {
                        startCamera();
                    }, 2000);
                }).catch(err => {
                    document.getElementById('result-msg').innerText = "❌ حدث خطأ في الاتصال!";
                    document.getElementById('result-msg').style.color = "red";
                    document.getElementById('btn-register').disabled = false;
                });
        }
    </script>

</body>
</html>
